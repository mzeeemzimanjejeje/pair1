kind = "web"
previewPath = "/"
title = "TRUTH-MD Pairing Site"
version = "1.0.0"
id = "artifacts/pairing-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24091

[services.development]
run = "pnpm --filter @workspace/pairing-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pairing-site", "run", "build" ]
publicDir = "artifacts/pairing-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24091"
BASE_PATH = "/"
