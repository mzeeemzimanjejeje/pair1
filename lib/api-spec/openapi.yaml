openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TRUTH-MD WhatsApp Bot Pairing API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pairing
    description: WhatsApp pairing operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /pair/qr:
    get:
      operationId: getPairingQr
      tags: [pairing]
      summary: Get pairing QR code
      description: Returns a base64 encoded QR code image for WhatsApp pairing
      responses:
        "200":
          description: QR code generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairingQr"
        "503":
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /pair/code:
    post:
      operationId: requestPairingCode
      tags: [pairing]
      summary: Request pairing code
      description: Request a 8-digit pairing code for the given phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairingCodeRequest"
      responses:
        "200":
          description: Pairing code generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairingCodeResponse"
        "400":
          description: Invalid phone number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /stats:
    get:
      operationId: getServerStats
      tags: [pairing]
      summary: Get server stats
      description: Returns live server statistics including uptime, visitor count, request counts
      responses:
        "200":
          description: Stats retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStats"
  /pair/status:
    get:
      operationId: getPairingStatus
      tags: [pairing]
      summary: Get pairing status
      description: Returns the current pairing/connection status of the bot
      responses:
        "200":
          description: Status retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairingStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    PairingQr:
      type: object
      properties:
        qr:
          type: string
          description: Base64 encoded QR code image (data URI)
        expiry:
          type: number
          description: Unix timestamp when QR expires
      required:
        - qr
    PairingCodeRequest:
      type: object
      properties:
        phoneNumber:
          type: string
          description: Phone number with country code (e.g. 1234567890)
      required:
        - phoneNumber
    PairingCodeResponse:
      type: object
      properties:
        code:
          type: string
          description: 8-digit pairing code formatted as XXXX-XXXX
        phoneNumber:
          type: string
      required:
        - code
        - phoneNumber
    PairingStatus:
      type: object
      properties:
        connected:
          type: boolean
          description: Whether the bot is connected to WhatsApp
        phone:
          type: string
          nullable: true
          description: Connected phone number if available
        state:
          type: string
          enum: [connecting, connected, disconnected, qr_ready, code_ready, waiting_confirm]
        sessionId:
          type: string
          nullable: true
          description: Generated session string prefixed with TRUTH-MD:~ (available once connected)
      required:
        - connected
        - state
    ServerStats:
      type: object
      properties:
        status:
          type: string
          enum: [online, offline]
        uptimeSeconds:
          type: number
        visitors:
          type: number
        requests:
          type: number
        success:
          type: number
        failed:
          type: number
      required:
        - status
        - uptimeSeconds
        - visitors
        - requests
        - success
        - failed
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
